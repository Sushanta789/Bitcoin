<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Login</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#141e30,#243b55);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#fff;
}

.container{
  width:100%;
  max-width:400px;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
}

input,button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

button{
  background:linear-gradient(90deg,#f7931a,#ffb347);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.result{
  margin-top:10px;
}

.error{
  color:red;
}
</style>
</head>

<body>

<div class="container">
  <h2>Bitcoin Login</h2>

  <input type="text" id="btcLogin" placeholder="Bitcoin Account Number">
  <button onclick="loginBTC()">Login</button>

  <div id="loginResult" class="result"></div>
</div>

<script>

// STORAGE
function getUsers(){
  return JSON.parse(localStorage.getItem("sk_bank_users")) || [];
}

// LOGIN FUNCTION
function loginBTC(){
  let input = document.getElementById("btcLogin").value.trim();
  let result = document.getElementById("loginResult");

  if(input === ""){
    result.innerHTML = `<p class="error">Please enter BTC Account</p>`;
    return;
  }

  let users = getUsers();
  let user = users.find(u => u.bitcoinAccount === input);

  if(!user){
    result.innerHTML = `<p class="error">Invalid BTC Account</p>`;
    return;
  }

  // ✅ SAVE LOGGED USER
  localStorage.setItem("loggedUser", JSON.stringify(user));

  // ✅ SUCCESS MESSAGE
  result.innerHTML = `<p>Login Successful ✔ Redirecting...</p>`;

  // ✅ REDIRECT TO DASHBOARD
  setTimeout(()=>{
    window.location.href = "dashboard.html";
  },1000);
}

</script>

</body>
</html>
