<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Dashboard</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#141e30,#243b55);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:#fff;
}

.container{
  width:100%;
  max-width:400px;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
}

.history{
  margin-top:10px;
  max-height:150px;
  overflow:auto;
  font-size:13px;
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.delete{background:#9c27b0;color:#fff;}
.logout{background:red;color:#fff;}

hr{
  border:0;
  border-top:1px solid rgba(255,255,255,0.2);
  margin:10px 0;
}
</style>
</head>

<body>

<div class="container">
  <h2>Dashboard</h2>

  <div id="userData"></div>

  <!-- DELETE BUTTON -->
  <button class="delete" onclick="goDelete()">Delete</button>

  <div id="historyBox" class="history"></div>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<script>

// LOAD USER
let user = JSON.parse(localStorage.getItem("loggedUser"));
let users = JSON.parse(localStorage.getItem("sk_bank_users")) || [];

if(!user){
  window.location.href = "login.html";
}

// LOAD DATA
function loadData(){
  users = JSON.parse(localStorage.getItem("sk_bank_users")) || [];
  user = users.find(u => u.bitcoinAccount === user.bitcoinAccount);

  if(!user){
    alert("User not found!");
    return;
  }

  localStorage.setItem("loggedUser", JSON.stringify(user));

  // 💰 DEMO BTC PRICE (1 BTC = ₹50,00,000)
  let btcPriceINR = 5000000;

  let btcInRupees = user.bitcoinBalance * btcPriceINR;
  let totalBalance = user.balance + btcInRupees;

  document.getElementById("userData").innerHTML = `
    <p><b>Name:</b> ${user.fullName}</p>
    <p><b>BTC Account:</b> ${user.bitcoinAccount}</p>

    <hr>

    <p><b>Bitcoin Balance:</b> ${user.bitcoinBalance} BTC</p>
    <p><b>BTC Value:</b> ₹${btcInRupees.toLocaleString()}</p>

    <hr>

    <p><b>S.K Bank Balance:</b> ₹${user.balance.toLocaleString()}</p>

    <hr>

    <p><b>Total Balance:</b> ₹${totalBalance.toLocaleString()}</p>
  `;

  // HISTORY
  let html = "<h4>Transaction History</h4>";
  user.history?.slice().reverse().forEach(t=>{
    html += `<p>${t.type} | ${t.amount} | ${t.date}</p>`;
  });

  document.getElementById("historyBox").innerHTML = html;
}

// DELETE PAGE NAVIGATION
function goDelete(){
  window.location.href = "delete.html";
}

// LOGOUT
function logout(){
  localStorage.removeItem("loggedUser");
  window.location.href = "login.html";
}

// INITIAL LOAD
loadData();

</script>

</body>
</html>
