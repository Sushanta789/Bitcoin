<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Dashboard</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#141e30,#243b55);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:#fff;
}

.container{
  width:100%;
  max-width:400px;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.delete{background:#9c27b0;color:#fff;}
.historyBtn{background:#00c6ff;color:#fff;}
.logout{background:red;color:#fff;}

hr{
  border:0;
  border-top:1px solid rgba(255,255,255,0.2);
  margin:10px 0;
}
</style>
</head>

<body>

<div class="container">
  <h2>Dashboard</h2>

  <div id="userData"></div>

  <!-- BUTTONS -->
  <button class="historyBtn" onclick="goHistory()">Transaction History</button>
  <button class="delete" onclick="goDelete()">Delete</button>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<script>

let user = JSON.parse(localStorage.getItem("loggedUser"));
let users = JSON.parse(localStorage.getItem("sk_bank_users")) || [];

if(!user){
  window.location.href = "login.html";
}

function loadData(){
  users = JSON.parse(localStorage.getItem("sk_bank_users")) || [];
  user = users.find(u => u.bitcoinAccount === user.bitcoinAccount);

  if(!user){
    alert("User not found!");
    return;
  }

  localStorage.setItem("loggedUser", JSON.stringify(user));

  let btcPriceINR = 5000000;
  let btcInRupees = user.bitcoinBalance * btcPriceINR;

  document.getElementById("userData").innerHTML = `
    <p><b>Name:</b> ${user.fullName}</p>
    <p><b>BTC Account:</b> ${user.bitcoinAccount}</p>

    <hr>

    <p><b>Bitcoin Balance:</b> ${user.bitcoinBalance} BTC</p>
    <p><b>BTC Value:</b> ₹${btcInRupees.toLocaleString()}</p>

    <hr>

    <p><b>S.K Bank Balance:</b> ₹${user.balance.toLocaleString()}</p>
  `;
}

function goHistory(){
  window.location.href = "transaction/transaction.html";
}

function goDelete(){
  window.location.href = "delete.html";
}

function logout(){
  localStorage.removeItem("loggedUser");
  window.location.href = "login.html";
}

loadData();

</script>

</body>
</html>
