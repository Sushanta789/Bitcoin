<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Data</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#141e30,#243b55);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#fff;
}

.container{
  width:100%;
  max-width:400px;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.error{color:red;}
</style>
</head>

<body>

<div class="container">
  <h2>Bitcoin Account Details</h2>

  <div id="dataBox"></div>

  <button onclick="loadData()">Load Data</button>
</div>

<script>

// GET USERS
function getUsers(){
  return JSON.parse(localStorage.getItem("sk_bank_users")) || [];
}

// LOAD DATA
function loadData(){
  let users = getUsers();
  let box = document.getElementById("dataBox");

  // find users who registered
  let registeredUsers = users.filter(u => u.activationCode);

  if(registeredUsers.length === 0){
    box.innerHTML = `<p class="error">No registration data found ❌</p>`;
    return;
  }

  let html = "";

  registeredUsers.forEach(user=>{
    html += `
      <p><b>Name:</b> ${user.fullName}</p>
      <p><b>Registration Number:</b> ${user.activationCode}</p>
      <hr>
    `;
  });

  box.innerHTML = html;
}

</script>

</body>
</html>
