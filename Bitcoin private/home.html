<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #141e30, #243b55);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
    }
    
    .container {
      width: 300px;
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 15px;
      text-align: center;
    }
    
    button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      background: #00c6ff;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    
    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  
  <div class="container">
    <h2>Welcome Home</h2>
    
    <button onclick="goToPage1()">Data</button>
    <button onclick="logout()">Activate</button>
    
  </div>
  
  <script>
    function goToPage1() {
      window.location.href = "../Bitcoin/data.html"; // your next page
    }
    
    function logout() {
      localStorage.removeItem("loggedUser");
      window.location.href = "../activate.html";
    }
  </script>
  
</body>

</html>
