<!DOCTYPE html>
<html>
<head>
<title>Private Security</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#141e30,#243b55);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#fff;
}

.container{
  width:300px;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  text-align:center;
  transition:0.3s;
}

/* Shake Animation */
@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(-8px);}
  50%{transform:translateX(8px);}
  75%{transform:translateX(-8px);}
  100%{transform:translateX(0);}
}

.shake{
  animation:shake 0.3s;
  background:rgba(255,0,0,0.2);
}

input,button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

button{
  background:#00c6ff;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.error{color:red;}
.success{color:#00e676;}
</style>
</head>

<body>

<div class="container" id="box">
  <h2>🔐 Private Access</h2>

  <input type="password" id="pinInput" placeholder="Enter Private Password" onkeypress="handleEnter(event)">
  
  <button onclick="checkPassword()">Unlock</button>

  <div id="msg"></div>
</div>

<!-- 🔊 MP3 AUDIO -->
<audio id="errorSound" src="sound/alarm_clock.mp3" preload="auto"></audio>
<audio id="successSound" src="sound/wood_plank_flicks.mp3" preload="auto"></audio>

<script>

// 🔓 Skip if already unlocked
if(sessionStorage.getItem("privateAccess")==="granted"){
  window.location.href="home.html";
}

const correctPassword = "Sush@5629$S.K";
let attempts = 0;
const maxAttempts = 3;

function playSound(audio){
  audio.pause();        // stop if already playing
  audio.currentTime = 0; // reset
  audio.play().catch(()=>{});
}

function checkPassword(){
  let inputBox = document.getElementById("pinInput");
  let input = inputBox.value.trim();
  let msg = document.getElementById("msg");
  let box = document.getElementById("box");

  let errorSound = document.getElementById("errorSound");
  let successSound = document.getElementById("successSound");

  if(attempts >= maxAttempts){
    msg.innerHTML = `<p class="error">Too many attempts! Redirecting...</p>`;
    setTimeout(()=>window.location.href="index.html",1500);
    return;
  }

  if(input === correctPassword){
    msg.innerHTML = `<p class="success">Access Granted ✔</p>`;

    // 🔊 Success sound
    playSound(successSound);

    sessionStorage.setItem("privateAccess","granted");

    setTimeout(()=>window.location.href="home.html",1000);

  } else {
    attempts++;

    msg.innerHTML = `<p class="error">Wrong Password ❌ (${attempts}/${maxAttempts})</p>`;

    // 🔊 Error sound
    playSound(errorSound);

    // 📳 Vibration
    if(navigator.vibrate){
      navigator.vibrate([200,100,200]);
    }

    // 🎬 Shake
    box.classList.add("shake");
    setTimeout(()=>box.classList.remove("shake"),300);

    inputBox.value="";

    if(attempts === maxAttempts){
      setTimeout(()=>window.location.href="../index.html",1500);
    }
  }
}

function handleEnter(e){
  if(e.key==="Enter"){
    checkPassword();
  }
}

</script>

</body>
</html>
