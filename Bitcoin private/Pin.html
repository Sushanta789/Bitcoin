<!DOCTYPE html>
<html>
<head>
<title>Private Security</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#141e30,#243b55);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#fff;
}

.container{
  width:300px;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  text-align:center;
}

input,button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

button{
  background:#00c6ff;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.error{color:red;}
.success{color:#00e676;}
</style>
</head>

<body>

<div class="container">
  <h2>🔐 Private Access</h2>

  <input type="password" id="pinInput" placeholder="Enter Private Password" onkeypress="handleEnter(event)">
  
  <button onclick="checkPassword()">Unlock</button>

  <div id="msg"></div>
</div>

<!-- 🔊 Sound -->
<audio id="errorSound" preload="auto">
  <source src="https://www.soundjay.com/buttons/beep-01a.mp3" type="audio/mpeg">
</audio>

<script>

// 🔓 Skip if already unlocked
if(sessionStorage.getItem("privateAccess") === "granted"){
  window.location.href = "home.html";
}

// 🔐 PASSWORD
const correctPassword = "Sush@5629$S.K";

// ❌ Attempt limit
let attempts = 0;
const maxAttempts = 3;

function checkPassword(){
  let inputBox = document.getElementById("pinInput");
  let input = inputBox.value.trim();
  let msg = document.getElementById("msg");
  let sound = document.getElementById("errorSound");

  // 🚫 Too many attempts
  if(attempts >= maxAttempts){
    msg.innerHTML = `<p class="error">Too many attempts! Redirecting...</p>`;
    setTimeout(()=>{
      window.location.href = "index.html";
    },1500);
    return;
  }

  // ✅ Correct password
  if(input === correctPassword){
    msg.innerHTML = `<p class="success">Access Granted ✔</p>`;

    sessionStorage.setItem("privateAccess", "granted");

    setTimeout(()=>{
      window.location.href = "home.html";
    },1000);

  } else {
    // ❌ Wrong password
    attempts++;
    msg.innerHTML = `<p class="error">Wrong Password ❌ (${attempts}/${maxAttempts})</p>`;

    // 🔊 Play sound
    sound.currentTime = 0;
    sound.play().catch(()=>{});

    inputBox.value = "";

    // 🔁 Redirect after max attempts
    if(attempts === maxAttempts){
      setTimeout(()=>{
        window.location.href = "index.html";
      },1500);
    }
  }
}

// ⌨️ Enter key support
function handleEnter(e){
  if(e.key === "Enter"){
    checkPassword();
  }
}

</script>

</body>
</html>
