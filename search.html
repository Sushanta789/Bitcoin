<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Search</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#141e30,#243b55);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#fff;
}

.container{
  width:100%;
  max-width:400px;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#f7931a,#ffb347);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.result{
  margin-top:15px;
  padding:12px;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  display:none;
}

.error{color:red;}
</style>
</head>

<body>

<div class="container">
  <h2>Search Bitcoin Account</h2>

  <input type="text" id="mobileInput" placeholder="Enter Mobile Number">
  <button onclick="searchBTC()">Search</button>

  <div id="resultBox" class="result"></div>
</div>

<script>

// STORAGE
function getUsers(){
  return JSON.parse(localStorage.getItem("sk_bank_users")) || [];
}

// SEARCH FUNCTION
function searchBTC(){
  let mobile = mobileInput.value.trim();
  let users = getUsers();
  let box = document.getElementById("resultBox");

  let user = users.find(u => u.mobile === mobile);

  if(!user){
    box.style.display="block";
    box.innerHTML = `<p class="error">Mobile Number Not Found</p>`;
    return;
  }

  // SHOW ONLY NAME + BTC ACCOUNT
  box.style.display="block";
  box.innerHTML = `
    <p><b>Full Name:</b> ${user.fullName}</p>
    <p><b>Bitcoin Account:</b> ${user.bitcoinAccount}</p>
  `;
}

// DOM
const mobileInput = document.getElementById("mobileInput");

</script>

</body>
</html>
